<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Néorussland — Fragment ARKOS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── RESET & BASE ARCHIVE ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #0a0806; }
    body {
      background: #0a0806;
      font-family: 'IM Fell English', Georgia, serif;
      color: #0e0c0a;
      line-height: 1.65;
      overflow-x: hidden;
    }

    :root {
      --ink:         #0e0c0a;
      --paper:       #f0ebe2;
      --paper-dark:  #e4ddd2;
      --rust:        #8b3a2a;
      --rust-light:  #b84d38;
      --steel:       #3a4a5c;
      --steel-light:#5b7492;
      --gold:        #9a7c3c;
      --gold-light:  #c4a054;
      --phosphor:    #00e55a;
      --void:        #0a0806;
    }

    /* Grain argentique / Bruit analogique global */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.045'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: overlay;
    }

    /* Animations d'apparition */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1), transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: none; }

    /* === COUVERTURE === */
    .cover {
      min-height: 100svh;
      background: #0d0b09;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      padding: 60px 24px;
      text-align: center;
    }
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
    }
    .cover-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 48%, rgba(0,229,90,0.08) 0%, transparent 70%);
    }
    .cover-frame {
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(154,124,60,0.2);
      pointer-events: none;
    }
    .cover-frame::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(154,124,60,0.08);
    }
    .cover-corner {
      position: absolute;
      width: 22px; height: 22px;
    }
    .cover-corner::before, .cover-corner::after {
      content: ''; position: absolute; background: var(--gold);
    }
    .cover-corner::before { width: 100%; height: 1px; top:0; left:0; }
    .cover-corner::after { width: 1px; height: 100%; top:0; left:0; }
    .tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
    .br { bottom: 18px; right: 18px; transform: scale(-1); }
    .tl { top: 18px; left: 18px; }
    
    .cover-content { position: relative; z-index: 4; max-width: 780px; width: 100%; }
    .cover-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      color: var(--gold); font-size: 0.7rem; letter-spacing: 0.35em;
      text-transform: uppercase; margin-bottom: 32px; opacity: 0.8;
    }
    .cover-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 9vw, 7rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.92;
      position: relative;
      text-shadow: 0 0 3px var(--phosphor), 0 0 8px var(--phosphor);
      animation: neonPulse 1.8s ease-in-out infinite alternate, glitch 6s infinite;
    }
    @keyframes neonPulse {
      0% { text-shadow: 0 0 2px var(--phosphor), 0 0 5px var(--phosphor), 0 0 8px rgba(0,229,90,0.6); }
      100% { text-shadow: 0 0 6px var(--phosphor), 0 0 15px var(--phosphor), 0 0 25px var(--phosphor), 0 0 35px rgba(0,229,90,0.8); }
    }
    .cover-title::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: var(--rust-light);
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
      transform: translate(-3px, 0);
      opacity: 0;
      animation: glitchOffset 6s infinite 2s;
    }
    .cover-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: var(--steel-light);
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      transform: translate(3px, 0);
      opacity: 0;
      animation: glitchOffset 6s infinite 2.1s;
    }
    @keyframes glitchOffset {
      0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
      91% { opacity: 0.7; transform: translate(-4px, 0); }
      93% { opacity: 0.7; transform: translate(4px, 0); }
      95% { opacity: 0.7; transform: translate(-2px, 0); }
      97% { opacity: 0; }
    }
    .cover-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 36px auto; max-width: 280px;
    }
    .cover-divider::before, .cover-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .cover-divider::after { background: linear-gradient(90deg, var(--gold), transparent); }
    .cover-divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }
    .cover-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(0.85rem,2vw,1rem); font-style: italic; color: rgba(240,235,226,0.55); letter-spacing: 0.04em; }
    .cover-meta { margin-top: 40px; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(154,124,60,0.55); }
    .cover-scroll {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-decoration: none; opacity: 0.6; transition: 0.3s; z-index: 4;
    }
    .cover-scroll:hover { opacity: 1; }
    .cover-scroll span { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.25em; }
    .cover-scroll-line { width: 1px; height: 44px; background: linear-gradient(180deg, var(--gold), transparent); animation: pulse-line 2s infinite; }
    @keyframes pulse-line { 0%,100%{ opacity:0.4; transform:scaleY(0.8); } 50%{ opacity:1; transform:scaleY(1); } }

    /* === STRUCTURE DU TEXTE / GRIMOIRE CYBER === */
    .book { background: var(--paper); position: relative; }
    .book::before {
      content: ''; position: absolute; top:0; left:0; right:0; height: 4px;
      background: linear-gradient(90deg, var(--rust) 0%, var(--rust) 33%, var(--gold) 33%, var(--gold) 66%, var(--steel) 66%, var(--steel) 100%);
    }
    .book::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(139,58,42,0.02) 0%, transparent 60%),
                  radial-gradient(circle at 85% 70%, rgba(58,74,92,0.02) 0%, transparent 70%);
      pointer-events: none;
    }

    .chapter-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(240,235,226,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(14,12,10,0.08);
      padding: 10px 24px;
      display: flex; gap: 0; overflow-x: auto;
      scrollbar-width: thin;
    }
    .chapter-nav-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; color: rgba(14,12,10,0.55);
      letter-spacing: 0.12em; text-transform: uppercase;
      text-decoration: none; padding: 6px 16px;
      white-space: nowrap; border-right: 1px solid rgba(14,12,10,0.12);
      transition: color 0.2s;
    }
    .chapter-nav-item:last-child { border-right: none; }
    .chapter-nav-item:hover, .chapter-nav-item.active { color: var(--rust); font-weight: 500; }

    .chapter-header {
      max-width: 1120px; margin: 0 auto; padding: 80px 24px 40px;
    }
    .chapter-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; color: var(--rust);
      letter-spacing: 0.35em; margin-bottom: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .chapter-num::after { content: ''; width: 44px; height: 1px; background: var(--rust); opacity: 0.4; }
    .chapter-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.6rem); font-weight: 700; color: var(--ink); line-height: 1.1; }

    .grid-layout {
      max-width: 1120px; margin: 0 auto; padding: 0 24px 60px;
      display: grid; grid-template-columns: repeat(12,1fr); column-gap: 48px; row-gap: 32px;
    }
    .text-column { grid-column: 1 / span 8; }
    .side-column { grid-column: 9 / span 4; position: sticky; top: 80px; align-self: start; }
    
    p {
      font-size: 1.18rem; line-height: 1.78;
      color: rgba(14,12,10,0.88); margin-bottom: 26px;
      text-align: justify;
    }
    .dropcap::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 4.6rem; float: left; margin-top: 6px; margin-right: 10px;
      line-height: 0.78; font-weight: 900; color: var(--rust);
    }
    code { font-family: 'Share Tech Mono', monospace; background: rgba(14,12,10,0.07); padding: 2px 5px; border-radius: 3px; font-size: 0.85em; color: var(--rust); }
    hr.chapter-break { border: none; border-top: 1px dashed rgba(14,12,10,0.2); margin: 42px 0; }
    
    /* Blocs de métadonnées Systèmes */
    .system-meta {
      border: 1px solid rgba(14,12,10,0.12);
      background: var(--paper-dark); padding: 18px 20px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .system-meta::before { content: ''; position: absolute; top:0; left:0; width: 3px; height: 100%; background: var(--steel); }
    .system-meta.rust-theme::before { background: var(--rust); }
    .system-meta-header {
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; font-weight: bold;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--steel);
      border-bottom: 1px solid rgba(14,12,10,0.1); padding-bottom: 10px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .system-meta-header::before { content: '▸'; color: var(--steel); }
    .meta-line {
      display: grid; grid-template-columns: auto 1fr; gap: 6px 12px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
      color: rgba(14,12,10,0.8); margin-bottom: 6px;
    }
    .side-image {
      width: 100%; border: 1px solid rgba(14,12,10,0.15);
      filter: sepia(0.1) contrast(1.02);
      margin-top: 12px;
      display: block;
    }
    
    /* Conteneur spécifique pour l'intégration de la pièce d'archive large (Panneau double) */
    .archive-multipanel {
      grid-column: 1 / -1;
      margin: 32px 0;
      border: 1px solid rgba(14,12,10,0.18);
      background: var(--paper-dark);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: 2fr 1fr;
    }
    .archive-media-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 16/9;
      border-right: 1px solid rgba(14,12,10,0.12);
    }
    .archive-media-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: sepia(0.06) contrast(1.03);
    }
    .archive-sidebar-data {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(14,12,10,0.02);
    }
    .archive-data-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      line-height: 1.5;
      color: rgba(14,12,10,0.75);
    }

    .quote-block {
      grid-column: 1 / -1; background: var(--paper-dark);
      padding: 32px 40px 32px 64px; margin: 8px 0 24px;
      position: relative;
    }
    .quote-block::before {
      content: '\201C'; position: absolute; top: 16px; left: 24px;
      font-family: 'Playfair Display', serif; font-size: 5rem; color: var(--rust); opacity: 0.3;
    }
    .quote-block p { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; color: var(--rust); margin-bottom: 12px; text-align: left; line-height: 1.4; }
    .quote-author { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--steel); letter-spacing: 0.1em; }

    /* Registre des personnages */
    .character-registry {
      background: var(--void); padding: 80px 24px 100px;
      position: relative;
    }
    .registry-header { max-width: 1000px; margin: 0 auto 48px; display: flex; align-items: center; gap: 20px; }
    .registry-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .registry-rule { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(154,124,60,0.5), transparent); }
    .character-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 28px; }
    .character-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(242,237,230,0.1);
      transition: 0.25s;
    }
    .character-card:hover { border-color: rgba(154,124,60,0.3); background: rgba(255,255,255,0.045); }
    .character-card-body { padding: 20px 24px 26px; }
    .character-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--paper); border-bottom: 1px solid rgba(242,237,230,0.1); margin-bottom: 14px; padding-bottom: 10px; }
    .character-details { font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; color: rgba(240,235,226,0.6); line-height: 1.7; }
    .character-details strong { color: var(--gold-light); font-weight: normal; }

    /* Responsive */
    @media (max-width: 900px) {
      .grid-layout { display: flex; flex-direction: column; }
      .side-column { order: -1; position: relative; top: 0; margin-bottom: 20px; width: 100%; }
      .text-column { width: 100%; }
      .archive-multipanel { grid-template-columns: 1fr; }
      .archive-media-wrapper { border-right: none; border-bottom: 1px solid rgba(14,12,10,0.12); }
      p { font-size: 1rem; }
      .quote-block p { font-size: 1.2rem; }
    }
    @media (max-width: 640px) {
      .chapter-title { font-size: 1.8rem; }
      .dropcap::first-letter { font-size: 3.2rem; margin-top: 2px; }
      .cover-title { font-size: 2.8rem; }
      .character-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="cover" id="top">
  <div class="cover-glow"></div>
  <div class="cover-frame"></div>
  <div class="cover-corner tl"></div><div class="cover-corner tr"></div><div class="cover-corner bl"></div><div class="cover-corner br"></div>
  <div class="cover-content">
    <p class="cover-eyebrow">Archive spéciale · ARKOS/VOID</p>
    <h1 class="cover-title" data-text="NÉORUSSLAND">NÉORUSSLAND</h1>
    <div class="cover-divider"><div class="cover-divider-diamond"></div></div>
    <p class="cover-sub">Réseaux clandestins, traitement de signal et fragments d'IA déchue</p>
    <p class="cover-meta">CLASSIFICATION : ZÉNITH ROUGE · DOSSIER #NRL-2051</p>
  </div>
  <a href="#book-start" class="cover-scroll"><span>Ouvrir l'archive</span><div class="cover-scroll-line"></div></a>
</header>

<main id="book-start" class="book">
  <nav class="chapter-nav">
    <a href="#ch1" class="chapter-nav-item">I — Le Dépotoir</a>
    <a href="#ch2" class="chapter-nav-item">II — Pouchkine</a>
    <a href="#ch3" class="chapter-nav-item">III — Atelier N°9</a>
    <a href="#ch4" class="chapter-nav-item">IV — Vera</a>
    <a href="#ch5" class="chapter-nav-item">V — Confrontation</a>
    <a href="#ch6" class="chapter-nav-item">VI — Moira</a>
    <a href="#ch7" class="chapter-nav-item">VII — La Mémoire</a>
  </nav>
