<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NÉORUSSLAND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0c0a;
    --paper: #f2ede6;
    --paper-dark: #e8e0d4;
    --rust: #8b3a2a;
    --rust-light: #c4513b;
    --steel: #3a4a5c;
    --steel-light: #5b7492;
    --gold: #a08444;
    --gold-light: #c9a85c;
    --fog: rgba(14,12,10,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    overflow-x: hidden; 
  }

  /* ── COVER ── */
  .cover {
    min-height: 100vh;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 60px 40px;
  }

  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 30%, rgba(139,58,42,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 80%, rgba(58,74,92,0.22) 0%, transparent 70%);
  }

  .cover-noise {
    position: absolute;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .cover-border {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(160,132,68,0.25);
    pointer-events: none;
  }
  .cover-border::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(160,132,68,0.1);
  }

  .cover-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    color: var(--gold);
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7.5rem); /* Ajusté pour éviter les débordements */
    font-weight: 900;
    color: var(--paper);
    text-align: center;
    line-height: 0.9;
    letter-spacing: -0.02em;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 80px rgba(139,58,42,0.4);
    white-space: nowrap; /* Empêche une coupure disgracieuse du titre principal */
  }

  .cover-title em {
    font-style: italic;
    color: var(--gold-light);
  }

  .cover-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 30px auto;
    position: relative;
    z-index: 1;
  }

  .cover-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(242,237,230,0.4);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    text-align: center;
    line-height: 2;
  }

  .cover-scroll {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  .cover-scroll span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: rgba(160,132,68,0.5);
    text-transform: uppercase;
  }

  .cover-scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(180deg, var(--gold), transparent);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
    50% { opacity: 1; transform: translateX(-50%) translateY(4px); }
  }

  /* ── BOOK PAGES ── */
  .book {
    background: var(--paper);
    position: relative;
  }

  .book::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--steel));
    z-index: 100;
  }

  /* ── CHAPTER OPENER ── */
  .chapter-opener {
    background: var(--paper);
    padding: 100px 60px 60px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    border-top: 1px solid rgba(14,12,10,0.1);
  }

  .chapter-opener::after {
    content: attr(data-number);
    position: absolute;
    right: -30px;
    top: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 18rem;
    font-weight: 900;
    color: rgba(14,12,10,0.04);
    line-height: 1;
    pointer-events: none;
  }

  .chapter-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chapter-tag::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--rust);
  }

  .chapter-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--ink);
    max-width: 600px;
    position: relative;
    z-index: 1;
  }

  /* ── FULL BLEED IMAGE ── */
  .full-bleed {
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    position: relative;
  }

  .full-bleed.portrait {
    aspect-ratio: 4/3;
  }

  .full-bleed img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: sepia(0.12) contrast(1.05);
    transition: transform 0.8s ease;
  }

  .full-bleed:hover img { transform: scale(1.02); }

  .full-bleed .caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 60px 40px 24px;
    background: linear-gradient(transparent, rgba(14,12,10,0.7));
    font-family: 'Share Tech Mono', monospace;
