<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НЕОРУССИЯ // SECTOR-4</title>
    <link href="https://youtu.be/lgRsgAjX61U" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --neon-pink: #ff0055;
            --neon-blue: #00f7ff;
            --soviet-red: #ff2a00;
            --concrete: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden; /* Permet le défilement vertical si nécessaire */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- Effet Scanlines (Vieux Moniteur) --- */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 255, 0, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 5;
            width: 100%;
            max-width: 800px;
        }

        /* --- Titre Glitch --- */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 10px;
            color: white;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            position: relative;
            margin-bottom: 5px;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-blue);
            clip: rect(10px, 450px, 30px, 0);
            animation: glitch-anim2 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.3deg); }
            100% { clip: rect(10px, 9999px, 85px, 0); transform: skew(-0.1deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(-0.5deg); }
            100% { clip: rect(30px, 9999px, 90px, 0); transform: skew(-0.3deg); }
        }

        .subtitle {
            color: var(--neon-pink);
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 3px;
        }

        /* --- Carte Brutaliste --- */
        .cyber-card {
            background: rgba(44, 44, 46, 0.8);
            border: 2px solid var(--soviet-red);
            padding: 20px;
            text-align: left;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
            box-shadow: 10px 10px 0 var(--soviet-red);
            margin-bottom: 30px;
        }

        .card-header {
            font-weight: bold;
            color: var(--soviet-red);
            border-bottom: 1px solid var(--soviet-red);
            margin-bottom: 10px;
            padding-bottom: 5px;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        /* --- Vidéo Responsive --- */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            margin-bottom: 30px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.3);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* --- Bouton Cyber --- */
        .cyber-button {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            font-family: 'Bebas Neue', sans-serif;
            transition: all 0.3s;
            letter-spacing: 4px;
            display: inline-block;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .cyber-button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .glitch-fixed {
            font-size: 0.6rem;
            color: var(--neon-pink);
            display: block;
            letter-spacing: 2px;
            margin-top: -4px;
            font-family: 'JetBrains Mono', monospace;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- Ticker --- */
        .ticker {
            margin-top: 20px;
            white-space: nowrap;
            overflow: hidden;
            border-top: 1px solid #333;
            padding-top: 10px;
            font-size: 0.8rem;
            color: #555;
        }

        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-move 20s linear infinite;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .neon-blue { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="container">
        <header>
            <h1 class="glitch" data-text="НЕОРУССИЯ">НЕОРУССИЯ</h1>
            <p class="subtitle">СЕКТОР 4 • DISTANCE: NORMALE</p>
        </header>

        <main>
            <div class="cyber-card">
                <div class="card-header">СТАТУС СИСТЕМЫ (ÉTAT SYSTÈME)</div>
                <div class="card-body">
                    <p>&gt; PROTOCOLE : <span class="neon-blue">ACTIF</span></p>
                    <p>&gt; TEMP : -42°C (STABLE)</p>
                    <p>&gt; RÉSEAU : CRYPTÉ</p>
                </div>
            </div>

            <!-- Vidéo sortie du bouton pour la validité HTML -->
            <iframe width="560" height="315" src="https://www.youtube.com/embed/lgRsgAjX61U?si=59IfYDvkb_0fZm2P" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

           
        </main>

        <footer>
            <div class="ticker">
                <span>// ALERTE : SURCHARGE DANS LE NOYAU URBAIN // ПОДТВЕРЖДЕНИЕ ЛИЧНОСТИ // SECTEUR 4 EN LIGNE // TEMPÉRATURE CRITIQUE DÉTECTÉE //</span>
            </div>
        </footer>
    </div>

</body>
</html>
