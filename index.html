
   <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Néorussland</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    /* ── 1. INITIALISATION & SÉCURITÉ RESPONSIVE STRUCTURELLE ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Protection absolue contre le défilement horizontal parasite */
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #0e0c0a;
    }

    :root {
      --ink: #0e0c0a;
      --paper: #f2ede6;
      --paper-dark: #e8e0d4;
      --rust: #8b3a2a;
      --rust-light: #c4513b;
      --steel: #3a4a5c;
      --steel-light: #5b7492;
      --gold: #a08444;
      --gold-light: #c9a85c;
      --phosphor: #00ff66;
    }

    body {
      font-family: 'IM Fell English', serif;
      color: var(--ink);
      line-height: 1.6;
    }

    main {
      width: 100%;
      max-width: 100%;
    }

    /* ── 2. COUVERTURE CYBER-LITTÉRAIRE ── */
    .cover {
      min-height: 100vh;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 20px;
      text-align: center;
    }

    .cover-border {
      position: absolute;
      inset: 15px;
      border: 1px solid rgba(160,132,68,0.15);
      pointer-events: none;
    }

    .cover-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .cover-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      color: var(--gold);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .cover-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.95;
    }

    .cover-title em {
      font-style: italic;
      color: var(--gold-light);
      font-weight: 700;
    }

    .cover-divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 30px auto;
    }

    .cover-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: rgba(242,237,230,0.6);
      line-height: 1.8;
    }

    .cover-image {
      max-width: 300px;
      width: 100%;
      height: auto;
      margin-top: 20px;
      border: 1px solid rgba(242,237,230,0.1);
      padding: 5px;
    }

    .cover-scroll {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      z-index: 2;
    }

    .cover-scroll span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .cover-scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, var(--gold), transparent);
    }

    /* ── 3. CORPS ÉDITORIAL DU LIVRE ── */
    .book {
      background: var(--paper);
      padding-bottom: 80px;
      position: relative;
    }

    .book::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--steel));
    }

    .chapter-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 20px 40px;
    }

    .chapter-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--rust);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .chapter-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--ink);
    }

    /* ── 4. LE SYSTÈME DE GRILLE RESPONSIVE ── */
    .grid-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 40px;
    }

    .text-column {
      grid-column: 1 / span 8;
    }

    .side-column {
      grid-column: 9 / span 4;
      border-left: 1px solid rgba(14,12,10,0.1);
      padding-left: 24px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.7;
      color: rgba(14,12,10,0.9);
      margin-bottom: 24px;
      text-align: justify;
    }

    .dropcap::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 4.5rem;
      float: left;
      margin-top: 4px;
      margin-right: 10px;
      line-height: 0.85;
      font-weight: 900;
      color: var(--rust);
    }

    .quote-block {
      grid-column: 1 / -1;
      font-size: 1.35rem;
      font-style: italic;
      color: var(--rust);
      border-left: 3px solid var(--rust);
      padding: 10px 0 10px 20px;
      margin: 30px 0;
    }

    .quote-author {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--steel);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .inline-image {
      width: 100%;
      height: auto;
      margin: 20px 0;
      border: 1px solid rgba(14,12,10,0.1);
    }

    /* ── 5. MÉTADONNÉES TECHNIQUES FILTRANTE (FLUIDE) ── */
    .system-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .system-meta-header {
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--steel);
      padding-bottom: 6px;
      margin-bottom: 12px;
      border-bottom: 1px dashed rgba(14,12,10,0.15);
    }

    .meta-line {
      display: block;
      margin-bottom: 4px;
    }

    .system-meta strong {
      color: var(--rust);
    }

    .rust-theme .system-meta-header {
      color: var(--rust);
      border-color: rgba(139,58,42,0.2);
    }

    /* ── 6. REGISTRE DES PORTRAITS (STRATUM NOIR CLASSIQUE) ── */
    .character-registry {
      width: 100%;
      background: var(--ink);
      color: var(--paper);
      padding: 80px 20px;
    }

    .registry-title {
      max-width: 1000px;
      margin: 0 auto 40px;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(160,132,68,0.2);
      padding-bottom: 10px;
    }

    .character-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .character-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(242,237,230,0.08);
      padding: 24px;
      border-radius: 2px;
    }

    .character-card-img {
      width: 100%;
      height: auto;
      max-height: 250px;
      object-fit: cover;
      margin-bottom: 15px;
      border: 1px solid rgba(242,237,230,0.1);
    }

    .character-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--paper);
      margin-bottom: 12px;
    }

    .character-details {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: rgba(242,237,230,0.6);
    }
