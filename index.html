<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEORUSSIA 2077 // SECTOR-4</title>
    <link rel="stylesheet" href="style.css">
    <!-- Police pour un look techno/brutaliste -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Effet de lignes de balayage (CRT) -->
    <div class="scanlines"></div>

    <div class="container">
        <header>
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="МОСКВА 2077">МОСКВА 2077</h1>
            </div>
            <p class="subtitle">СЕКТОР 4 • DISTANCE: NORMALE</p>
        </header>

        <main>
            <div class="cyber-card">
                <div class="card-header">СТАТУС СИСТЕМЫ (ÉTAT SYSTÈME)</div>
                <div class="card-body">
                    <p>> PROTOCOLE : <span class="neon-blue">ACTIF</span></p>
                    <p>> TEMP : -42°C (STABLE)</p>
                    <p>> RÉSEAU : CRYPTÉ</p>
                </div>
            </div>

            <button class="cyber-button">
                ВХОД (ENTRER)
                <span class="glitch-fixed">ERROR_</span>
            </button>
        </main>

        <footer>
            <div class="ticker">
                <span>// ALERTE : SURCHARGE DANS LE NOYAU URBAIN // ПОДТВЕРЖДЕНИЕ ЛИЧНОСТИ //</span>
            </div>
        </footer>
    </div>

</body>
</html>
